name: Nix flake check

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Flake check
        run: nix flake check --show-trace

      - name: Eval main host
        run: nix eval .#nixosConfigurations.main.config.system.build.toplevel --show-trace

      - name: Eval vm host
        run: nix eval .#nixosConfigurations.vm.config.system.build.toplevel --show-trace

      - name: Eval homeserver host
        run: nix eval .#nixosConfigurations.homeserver.config.system.build.toplevel --show-trace

      - name: Static analysis (statix)
        run: nix run nixpkgs#statix -- check .

      - name: Dead code (deadnix)
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Format check (nixfmt)
        run: nix fmt -- --check .
