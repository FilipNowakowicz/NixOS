name: Nix flake check

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cachix
        uses: cachix/cachix-action@v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Flake check
        run: nix flake check --show-trace

      - name: Build main host
        run: nix build .#nixosConfigurations.main.config.system.build.toplevel --no-link --show-trace

      - name: Build vm host
        run: nix build .#nixosConfigurations.vm.config.system.build.toplevel --no-link --show-trace

      - name: Build homeserver host
        run: nix build .#nixosConfigurations.homeserver.config.system.build.toplevel --no-link --show-trace

      - name: Build homeserver-vm host
        run: nix build .#nixosConfigurations.homeserver-vm.config.system.build.toplevel --no-link --show-trace

      - name: Lint (statix)
        run: nix run nixpkgs#statix -- check .

      - name: Dead code (deadnix)
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Format check (treefmt)
        run: nix fmt -- --fail-on-change

  closure-diff:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: flake-check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cachix
        uses: cachix/cachix-action@v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Compute closure diffs
        id: diff
        run: |
          mkdir -p /tmp/closure-reports

          # Get base and target refs
          BASE_REF="origin/${{ github.base_ref }}"
          TARGET_REF="HEAD"

          # Compute diffs for both hosts
          {
            echo "# Closure Size Report"
            echo ""
            bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "main" || echo "Failed to diff main"
            echo ""
            bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "homeserver" || echo "Failed to diff homeserver"
            echo ""
            echo "<details>"
            echo "<summary>Full nvd output</summary>"
            echo ""
            echo "\`\`\`"
            bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "main" 2>&1 || true
            bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "homeserver" 2>&1 || true
            echo "\`\`\`"
            echo ""
            echo "</details>"
          } > /tmp/closure-reports/summary.md

          # Store summary for comment step
          {
            echo "summary<<EOF"
            cat /tmp/closure-reports/summary.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post closure diff comment
        if: always() && github.event_name == 'pull_request'
        env:
          SUMMARY: ${{ steps.diff.outputs.summary }}
        uses: actions/github-script@v7
        with:
          script: |
            const summary = process.env.SUMMARY;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary || 'Closure diff computation skipped or failed.'
            });

  # Detect whether paths relevant to the homeserver-vm smoke test changed.
  changes:
    runs-on: ubuntu-latest
    outputs:
      homeserver: ${{ steps.filter.outputs.homeserver }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if git diff --name-only "$BASE_SHA" HEAD 2>/dev/null | grep -qE '^(hosts/homeserver|modules/|lib/)'; then
            echo "homeserver=true" >> "$GITHUB_OUTPUT"
          else
            echo "homeserver=false" >> "$GITHUB_OUTPUT"
          fi

  smoke-test:
    needs: [flake-check, changes]
    if: needs.changes.outputs.homeserver == 'true'
    # NixOS tests require KVM. GitHub-hosted ubuntu-latest runners expose
    # /dev/kvm on public repositories. For private repos or self-hosted runners,
    # verify that KVM is available before relying on this job — it will silently
    # time out rather than fail fast if /dev/kvm is absent.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            system-features = nixos-test benchmark big-parallel kvm

      - name: Cachix
        uses: cachix/cachix-action@v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: homeserver-vm smoke test
        run: nix build .#checks.x86_64-linux.homeserver-vm-smoke --show-trace
