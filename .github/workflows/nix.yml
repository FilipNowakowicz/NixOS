name: Nix flake check

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cachix
        uses: cachix/cachix-action@v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Flake check
        run: nix flake check --show-trace

      - name: Build main host
        env:
          CI: "true"
        run: nix build .#nixosConfigurations.main.config.system.build.toplevel --no-link --show-trace --print-out-paths | tee -a /tmp/cachix-paths.txt

      - name: Build vm host
        run: nix build .#nixosConfigurations.vm.config.system.build.toplevel --no-link --show-trace --print-out-paths | tee -a /tmp/cachix-paths.txt

      - name: Build homeserver host
        run: nix build .#nixosConfigurations.homeserver.config.system.build.toplevel --no-link --show-trace --print-out-paths | tee -a /tmp/cachix-paths.txt

      - name: Build homeserver-vm host
        run: nix build .#nixosConfigurations.homeserver-vm.config.system.build.toplevel --no-link --show-trace --print-out-paths | tee -a /tmp/cachix-paths.txt

      - name: Push built paths to Cachix
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          test -n "$CACHIX_AUTH_TOKEN" || exit 0
          test -f /tmp/cachix-paths.txt || exit 0
          sort -u /tmp/cachix-paths.txt | xargs --no-run-if-empty cachix push filipnowakowicz

      - name: Lint (statix)
        run: nix run nixpkgs#statix -- check .

      - name: Dead code (deadnix)
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Format check (treefmt)
        run: nix fmt -- --fail-on-change

      - name: Lint shell (shellcheck)
        run: nix run nixpkgs#shellcheck -- $(find . -type f -name '*.sh' -not -path './.*')

  closure-diff:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: flake-check
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cachix
        uses: cachix/cachix-action@v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Compute closure diffs
        id: diff
        run: |
          mkdir -p /tmp/closure-reports

          # Get base and target refs
          BASE_REF="origin/${{ github.base_ref }}"
          TARGET_REF="HEAD"

          # Compute diffs for both hosts
          {
            echo "# Closure Size Report"
            echo ""
            bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "main" || echo "Failed to diff main"
            echo ""
            bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "homeserver" || echo "Failed to diff homeserver"
            echo ""
            echo "<details>"
            echo "<summary>Full nvd output</summary>"
            echo ""
            echo "\`\`\`"
            bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "main" 2>&1 || true
            bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "homeserver" 2>&1 || true
            echo "\`\`\`"
            echo ""
            echo "</details>"
          } > /tmp/closure-reports/summary.md

          # Store summary for comment step
          {
            echo "summary<<EOF"
            cat /tmp/closure-reports/summary.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post closure diff comment
        if: always() && github.event_name == 'pull_request'
        env:
          SUMMARY: ${{ steps.diff.outputs.summary }}
        uses: actions/github-script@v7
        with:
          script: |
            const summary = process.env.SUMMARY;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary || 'Closure diff computation skipped or failed.'
            });

  # Detect whether paths relevant to smoke tests changed.
  changes:
    runs-on: ubuntu-latest
    outputs:
      homeserver: ${{ steps.filter.outputs.homeserver }}
      vm: ${{ steps.filter.outputs.vm }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if git diff --name-only "$BASE_SHA" HEAD 2>/dev/null | grep -qE '^(hosts/homeserver(-vm)?/|modules/|lib/|tests/)'; then
            echo "homeserver=true" >> "$GITHUB_OUTPUT"
          else
            echo "homeserver=false" >> "$GITHUB_OUTPUT"
          fi

          if git diff --name-only "$BASE_SHA" HEAD 2>/dev/null | grep -qE '^(hosts/vm/|modules/|lib/|tests/)'; then
            echo "vm=true" >> "$GITHUB_OUTPUT"
          else
            echo "vm=false" >> "$GITHUB_OUTPUT"
          fi

  # Invariant checks for real hardware configs
  invariants:
    needs: flake-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cachix
        uses: cachix/cachix-action@v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Check main invariants
        run: nix build .#checks.x86_64-linux.invariants-main --show-trace --print-out-paths | tee -a /tmp/cachix-paths.txt

      - name: Check homeserver invariants
        run: nix build .#checks.x86_64-linux.invariants-homeserver --show-trace --print-out-paths | tee -a /tmp/cachix-paths.txt

      - name: Push built paths to Cachix
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          test -n "$CACHIX_AUTH_TOKEN" || exit 0
          test -f /tmp/cachix-paths.txt || exit 0
          sort -u /tmp/cachix-paths.txt | xargs --no-run-if-empty cachix push filipnowakowicz

  smoke-test:
    needs: [flake-check, changes]
    if: needs.changes.outputs.homeserver == 'true' || needs.changes.outputs.vm == 'true'
    # NixOS tests require KVM. GitHub-hosted ubuntu-latest runners expose
    # /dev/kvm on public repositories. For private repos or self-hosted runners,
    # verify that KVM is available before relying on this job — it will silently
    # time out rather than fail fast if /dev/kvm is absent.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            system-features = nixos-test benchmark big-parallel kvm

      - name: Cachix
        uses: cachix/cachix-action@v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: vm smoke test
        if: needs.changes.outputs.vm == 'true'
        run: nix build .#checks.x86_64-linux.vm-smoke --show-trace --print-out-paths | tee -a /tmp/cachix-paths.txt

      - name: homeserver-vm smoke test
        if: needs.changes.outputs.homeserver == 'true'
        run: nix build .#checks.x86_64-linux.homeserver-vm-smoke --show-trace --print-out-paths | tee -a /tmp/cachix-paths.txt

      - name: Push built paths to Cachix
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          test -n "$CACHIX_AUTH_TOKEN" || exit 0
          test -f /tmp/cachix-paths.txt || exit 0
          sort -u /tmp/cachix-paths.txt | xargs --no-run-if-empty cachix push filipnowakowicz

  # Single required-check gate for branch protection.
  # Configure GitHub branch protection to require ONLY this job:
  #   Settings → Branches → Branch name pattern: main
  #   ✓ Require status checks to pass before merging
  #   ✓ Require branches to be up to date before merging
  #   Required check name: "merge-gate"
  # This prevents flake-update auto-merge from bypassing CI: `gh pr merge --auto`
  # only merges when all required checks pass, so this job is the enforcement point.
  # smoke-test and closure-diff are allowed to be skipped (they are conditional).
  merge-gate:
    needs: [flake-check, invariants, closure-diff, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        env:
          RESULT_FLAKE: ${{ needs.flake-check.result }}
          RESULT_INVARIANTS: ${{ needs.invariants.result }}
          RESULT_CLOSURE: ${{ needs.closure-diff.result }}
          RESULT_SMOKE: ${{ needs.smoke-test.result }}
        run: |
          echo "flake-check:  $RESULT_FLAKE"
          echo "invariants:   $RESULT_INVARIANTS"
          echo "closure-diff: $RESULT_CLOSURE"
          echo "smoke-test:   $RESULT_SMOKE"

          fail=0
          [[ "$RESULT_FLAKE" == "success" ]]      || { echo "FAIL: flake-check ($RESULT_FLAKE)"; fail=1; }
          [[ "$RESULT_INVARIANTS" == "success" ]] || { echo "FAIL: invariants ($RESULT_INVARIANTS)"; fail=1; }
          # closure-diff is PR-only — skipped on push events, acceptable
          [[ "$RESULT_CLOSURE" == "success" || "$RESULT_CLOSURE" == "skipped" ]] \
            || { echo "FAIL: closure-diff ($RESULT_CLOSURE)"; fail=1; }
          # smoke-test is path-conditional — skipped when no relevant paths changed, acceptable
          [[ "$RESULT_SMOKE" == "success" || "$RESULT_SMOKE" == "skipped" ]] \
            || { echo "FAIL: smoke-test ($RESULT_SMOKE)"; fail=1; }

          exit $fail
