name: Nix flake check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: nix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CACHIX_PUSH_FILTER: "(-source$|nixpkgs\\.tar\\.gz$)"

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            max-jobs = auto

      - name: Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true
          pushFilter: ${{ env.CACHIX_PUSH_FILTER }}

      - name: Flake evaluation
        run: nix flake check --no-build --show-trace

  checks-light:
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            max-jobs = auto

      - name: Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true
          pushFilter: ${{ env.CACHIX_PUSH_FILTER }}

      - name: Build lightweight blocking checks
        run: |
          nix build \
            .#checks.x86_64-linux.deploy-activate \
            .#checks.x86_64-linux.deploy-schema \
            .#checks.x86_64-linux.invariants-main \
            .#checks.x86_64-linux.invariants-vm \
            .#checks.x86_64-linux.invariants-homeserver \
            .#checks.x86_64-linux.invariants-homeserver-vm \
            .#checks.x86_64-linux.homeserver-sops-bootstrap \
            .#checks.x86_64-linux.lib-generators \
            .#checks.x86_64-linux.lib-generators-golden \
            .#checks.x86_64-linux.lib-acl \
            --no-link --show-trace

  lint:
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            max-jobs = auto

      - name: Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true
          pushFilter: ${{ env.CACHIX_PUSH_FILTER }}

      - name: Lint (statix)
        run: nix run nixpkgs#statix -- check .

      - name: Dead code (deadnix)
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Format check (treefmt)
        run: nix fmt -- --fail-on-change

      - name: Lint shell (shellcheck)
        run: |
          mapfile -t shell_scripts < <(find . -type f -name '*.sh' -not -path './.*')
          if [ "${#shell_scripts[@]}" -eq 0 ]; then
            exit 0
          fi
          nix run nixpkgs#shellcheck -- "${shell_scripts[@]}"

  hosts:
    needs: eval
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: main-ci
            attr: .#nixosConfigurations.main-ci.config.system.build.toplevel
          - name: vm
            attr: .#nixosConfigurations.vm.config.system.build.toplevel
          - name: homeserver
            attr: .#nixosConfigurations.homeserver.config.system.build.toplevel
          - name: homeserver-vm
            attr: .#nixosConfigurations.homeserver-vm.config.system.build.toplevel
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            max-jobs = auto

      - name: Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true
          pushFilter: ${{ env.CACHIX_PUSH_FILTER }}

      - name: Build ${{ matrix.name }}
        run: nix build ${{ matrix.attr }} --no-link --show-trace

  changes:
    runs-on: ubuntu-latest
    outputs:
      homeserver: ${{ steps.filter.outputs.homeserver }}
      vm: ${{ steps.filter.outputs.vm }}
      profiles: ${{ steps.filter.outputs.profiles }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          base_sha="$BASE_SHA"
          if ! git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
            base_sha="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi

          changed_files="$(git diff --name-only "$base_sha" HEAD)"

          if grep -qE '^(flake\.nix|flake\.lock|hosts/homeserver(-vm)?/|modules/|lib/|home/|tests/nixos/)' <<<"$changed_files"; then
            echo "homeserver=true" >> "$GITHUB_OUTPUT"
          else
            echo "homeserver=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -qE '^(flake\.nix|flake\.lock|hosts/vm/|modules/|lib/|home/|tests/nixos/)' <<<"$changed_files"; then
            echo "vm=true" >> "$GITHUB_OUTPUT"
          else
            echo "vm=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -qE '^(flake\.nix|flake\.lock|modules/|lib/|home/|tests/nixos/)' <<<"$changed_files"; then
            echo "profiles=true" >> "$GITHUB_OUTPUT"
          else
            echo "profiles=false" >> "$GITHUB_OUTPUT"
          fi

  smoke-vm:
    needs: [changes, hosts]
    if: needs.changes.outputs.vm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            system-features = nixos-test benchmark big-parallel kvm
            max-jobs = auto

      - name: Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true
          pushFilter: ${{ env.CACHIX_PUSH_FILTER }}

      - name: vm smoke test
        run: nix build .#legacyPackages.x86_64-linux.ciTests.vm-smoke --no-link --show-trace

  smoke-homeserver:
    needs: [changes, hosts]
    if: needs.changes.outputs.homeserver == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            system-features = nixos-test benchmark big-parallel kvm
            max-jobs = auto

      - name: Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true
          pushFilter: ${{ env.CACHIX_PUSH_FILTER }}

      - name: homeserver-vm smoke test
        run: nix build .#legacyPackages.x86_64-linux.ciTests.homeserver-vm-smoke --no-link --show-trace

  profile-tests:
    needs: [changes, hosts]
    if: needs.changes.outputs.profiles == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: profile-security
            attr: .#legacyPackages.x86_64-linux.ciTests.profile-security
          - name: profile-observability
            attr: .#legacyPackages.x86_64-linux.ciTests.profile-observability
          - name: profile-hardening
            attr: .#legacyPackages.x86_64-linux.ciTests.profile-hardening
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            system-features = nixos-test benchmark big-parallel kvm
            max-jobs = auto

      - name: Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true
          pushFilter: ${{ env.CACHIX_PUSH_FILTER }}

      - name: Build ${{ matrix.name }}
        run: nix build ${{ matrix.attr }} --no-link --show-trace

  closure-diff:
    if: github.event_name == 'pull_request'
    needs: hosts
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            max-jobs = auto

      - name: Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: filipnowakowicz
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: true
          pushFilter: ${{ env.CACHIX_PUSH_FILTER }}

      - name: Compute closure diffs
        id: diff
        run: |
          BASE_REF="origin/${{ github.base_ref }}"
          TARGET_REF="HEAD"

          {
            echo "<!-- closure-diff-report -->"
            echo "# Closure Size Report"
            echo
            bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "main" || echo "Failed to diff main"
            echo
            bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "homeserver" || echo "Failed to diff homeserver"
          } > /tmp/closure-summary.md

          {
            echo "summary<<EOF"
            cat /tmp/closure-summary.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert closure diff comment
        if: always()
        env:
          SUMMARY: ${{ steps.diff.outputs.summary }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const body = process.env.SUMMARY || '<!-- closure-diff-report -->\nClosure diff computation skipped or failed.';
            const marker = '<!-- closure-diff-report -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  merge-gate:
    needs:
      - eval
      - checks-light
      - lint
      - hosts
      - smoke-vm
      - smoke-homeserver
      - profile-tests
      - closure-diff
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        env:
          RESULT_EVAL: ${{ needs.eval.result }}
          RESULT_CHECKS_LIGHT: ${{ needs.checks-light.result }}
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_HOSTS: ${{ needs.hosts.result }}
          RESULT_SMOKE_VM: ${{ needs.smoke-vm.result }}
          RESULT_SMOKE_HOMESERVER: ${{ needs.smoke-homeserver.result }}
          RESULT_PROFILE_TESTS: ${{ needs.profile-tests.result }}
          RESULT_CLOSURE: ${{ needs.closure-diff.result }}
        run: |
          echo "eval:              $RESULT_EVAL"
          echo "checks-light:      $RESULT_CHECKS_LIGHT"
          echo "lint:              $RESULT_LINT"
          echo "hosts:             $RESULT_HOSTS"
          echo "smoke-vm:          $RESULT_SMOKE_VM"
          echo "smoke-homeserver:  $RESULT_SMOKE_HOMESERVER"
          echo "profile-tests:     $RESULT_PROFILE_TESTS"
          echo "closure-diff:      $RESULT_CLOSURE"

          fail=0
          [[ "$RESULT_EVAL" == "success" ]] || { echo "FAIL: eval ($RESULT_EVAL)"; fail=1; }
          [[ "$RESULT_CHECKS_LIGHT" == "success" ]] || { echo "FAIL: checks-light ($RESULT_CHECKS_LIGHT)"; fail=1; }
          [[ "$RESULT_LINT" == "success" ]] || { echo "FAIL: lint ($RESULT_LINT)"; fail=1; }
          [[ "$RESULT_HOSTS" == "success" ]] || { echo "FAIL: hosts ($RESULT_HOSTS)"; fail=1; }
          [[ "$RESULT_SMOKE_VM" == "success" || "$RESULT_SMOKE_VM" == "skipped" ]] \
            || { echo "FAIL: smoke-vm ($RESULT_SMOKE_VM)"; fail=1; }
          [[ "$RESULT_SMOKE_HOMESERVER" == "success" || "$RESULT_SMOKE_HOMESERVER" == "skipped" ]] \
            || { echo "FAIL: smoke-homeserver ($RESULT_SMOKE_HOMESERVER)"; fail=1; }
          [[ "$RESULT_PROFILE_TESTS" == "success" || "$RESULT_PROFILE_TESTS" == "skipped" ]] \
            || { echo "FAIL: profile-tests ($RESULT_PROFILE_TESTS)"; fail=1; }
          [[ "$RESULT_CLOSURE" == "success" || "$RESULT_CLOSURE" == "skipped" ]] \
            || { echo "FAIL: closure-diff ($RESULT_CLOSURE)"; fail=1; }

          exit $fail
