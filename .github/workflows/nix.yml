name: Nix flake check

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.plan.outputs.hosts }}
      hosts_matrix: ${{ steps.plan.outputs.hosts_matrix }}
      tests: ${{ steps.plan.outputs.tests }}
      tests_matrix: ${{ steps.plan.outputs.tests_matrix }}
      closure: ${{ steps.plan.outputs.closure }}
      closure_main: ${{ steps.plan.outputs.closure_main }}
      closure_homeserver: ${{ steps.plan.outputs.closure_homeserver }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - id: plan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: bash scripts/ci-plan.sh

  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-nix

      - name: Flake evaluation
        run: bash scripts/validate.sh flake-eval

  checks-light:
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-nix

      - name: Build lightweight blocking checks
        run: bash scripts/validate.sh light

      - name: Push to cache
        if: success()
        continue-on-error: true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CACHE_SIGNING_KEY: ${{ secrets.CACHE_SIGNING_KEY }}
        run: bash scripts/push-to-r2.sh light

  lint:
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-nix

      - name: Lint (statix)
        run: nix run nixpkgs#statix -- check .

      - name: Dead code (deadnix)
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Format check (treefmt)
        run: nix fmt -- --fail-on-change

      - name: Lint shell (shellcheck)
        run: |
          mapfile -t shell_scripts < <(find . -type f -name '*.sh' -not -path './.*')
          if [ "${#shell_scripts[@]}" -eq 0 ]; then
            exit 0
          fi
          nix run nixpkgs#shellcheck -- "${shell_scripts[@]}"

  hosts:
    needs: [changes, eval]
    if: needs.changes.outputs.hosts == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.hosts_matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-nix

      - name: Build ${{ matrix.name }}
        env:
          HOST: ${{ matrix.name }}
        run: bash scripts/validate.sh host "$HOST"

      - name: Push ${{ matrix.name }} to cache
        if: success()
        continue-on-error: true
        env:
          HOST: ${{ matrix.name }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CACHE_SIGNING_KEY: ${{ secrets.CACHE_SIGNING_KEY }}
        run: bash scripts/push-to-r2.sh host "$HOST"

  tests:
    needs: [changes, eval, hosts]
    if: |
      always()
      && needs.changes.outputs.tests == 'true'
      && needs.eval.result == 'success'
      && (needs.hosts.result == 'success' || needs.hosts.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.tests_matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: ./.github/actions/setup-nix
        with:
          extra-nix-config: |
            system-features = nixos-test benchmark big-parallel kvm

      - name: Build ${{ matrix.name }}
        env:
          CMD: ${{ matrix.command }}
          TARGET: ${{ matrix.target }}
        run: bash scripts/validate.sh "$CMD" "$TARGET"

      - name: Push ${{ matrix.name }} to cache
        if: success()
        continue-on-error: true
        env:
          CMD: ${{ matrix.command }}
          TARGET: ${{ matrix.target }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CACHE_SIGNING_KEY: ${{ secrets.CACHE_SIGNING_KEY }}
        run: bash scripts/push-to-r2.sh "$CMD" "$TARGET"

  closure-diff:
    if: github.event_name == 'pull_request' && needs.changes.outputs.closure == 'true'
    needs: [changes, hosts]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nix

      - name: Compute closure diffs
        id: diff
        env:
          DIFF_MAIN: ${{ needs.changes.outputs.closure_main }}
          DIFF_HOMESERVER: ${{ needs.changes.outputs.closure_homeserver }}
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          TARGET_REF="HEAD"

          {
            echo "<!-- closure-diff-report -->"
            echo "# Closure Size Report"
            echo

            if [[ "$DIFF_MAIN" == "true" ]]; then
              bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "main" || echo "Failed to diff main"
            fi

            if [[ "$DIFF_HOMESERVER" == "true" ]]; then
              if [[ "$DIFF_MAIN" == "true" ]]; then
                echo
              fi
              bash scripts/closure-diff.sh "$BASE_REF" "$TARGET_REF" "homeserver" || echo "Failed to diff homeserver"
            fi
          } > /tmp/closure-summary.md

          {
            echo "summary<<EOF"
            cat /tmp/closure-summary.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert closure diff comment
        if: always()
        env:
          SUMMARY: ${{ steps.diff.outputs.summary }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const upsert = require("./.github/scripts/upsert-closure-comment.js");
            await upsert({ github, context, core });

  merge-gate:
    needs:
      - eval
      - checks-light
      - lint
      - hosts
      - tests
      - closure-diff
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required checks passed
        env:
          RESULT_EVAL: ${{ needs.eval.result }}
          RESULT_CHECKS_LIGHT: ${{ needs.checks-light.result }}
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_HOSTS: ${{ needs.hosts.result }}
          RESULT_TESTS: ${{ needs.tests.result }}
          RESULT_CLOSURE: ${{ needs.closure-diff.result }}
        run: |
          echo "eval:          $RESULT_EVAL"
          echo "checks-light:  $RESULT_CHECKS_LIGHT"
          echo "lint:          $RESULT_LINT"
          echo "hosts:         $RESULT_HOSTS"
          echo "tests:         $RESULT_TESTS"
          echo "closure-diff:  $RESULT_CLOSURE"

          fail=0
          [[ "$RESULT_EVAL" == "success" ]] || { echo "FAIL: eval ($RESULT_EVAL)"; fail=1; }
          [[ "$RESULT_CHECKS_LIGHT" == "success" ]] || { echo "FAIL: checks-light ($RESULT_CHECKS_LIGHT)"; fail=1; }
          [[ "$RESULT_LINT" == "success" ]] || { echo "FAIL: lint ($RESULT_LINT)"; fail=1; }
          [[ "$RESULT_HOSTS" == "success" || "$RESULT_HOSTS" == "skipped" ]] \
            || { echo "FAIL: hosts ($RESULT_HOSTS)"; fail=1; }
          [[ "$RESULT_TESTS" == "success" || "$RESULT_TESTS" == "skipped" ]] \
            || { echo "FAIL: tests ($RESULT_TESTS)"; fail=1; }
          [[ "$RESULT_CLOSURE" == "success" || "$RESULT_CLOSURE" == "skipped" ]] \
            || { echo "FAIL: closure-diff ($RESULT_CLOSURE)"; fail=1; }

          exit $fail
