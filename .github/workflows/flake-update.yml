name: Flake update

on:
  schedule:
    # Friday 6 PM UTC
    - cron: "0 18 * * 5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flake-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-nix

      - name: Require automation token
        env:
          AUTOMATION_TOKEN: ${{ secrets.FLAKE_UPDATE_TOKEN }}
        run: |
          if [ -z "$AUTOMATION_TOKEN" ]; then
            echo "FLAKE_UPDATE_TOKEN is required so the PR triggers pull_request CI." >&2
            exit 1
          fi

      - name: Update flake.lock
        run: nix flake update

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          commit-message: "chore: update flake.lock (weekly)"
          title: "[bot] weekly flake update"
          body: "Automated weekly update of flake.lock. This PR auto-merges if the required merge gate passes."
          branch: automated/flake-update
          base: main
          delete-branch: true

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "$PR_NUMBER"
