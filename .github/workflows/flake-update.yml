name: Flake update

on:
  schedule:
    # Friday 6 PM UTC
    - cron: '0 18 * * 5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update flake.lock
        run: nix flake update

      - name: Commit and push changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add flake.lock
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update flake.lock (weekly)"
          git push origin HEAD:flake-update -f

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head flake-update \
            --title "[bot] weekly flake update" \
            --body "Automated weekly update of flake.lock.

This PR auto-merges if all checks pass. Review the closure-diff comment below for impact on system size." \
            --repo ${{ github.repository }} || true
