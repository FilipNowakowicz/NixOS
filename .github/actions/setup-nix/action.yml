name: Setup Nix
description: Install Nix and optionally configure Cachix.

inputs:
  cachix-name:
    description: Cachix cache name. Leave empty to skip Cachix.
    required: false
    default: ""
  cachix-auth-token:
    description: Cachix auth token.
    required: false
    default: ""
  cachix-push-filter:
    description: Cachix push filter.
    required: false
    default: "(-source$|nixpkgs\\.tar\\.gz$)"
  extra-nix-config:
    description: Extra nix.conf lines.
    required: false
    default: |
      experimental-features = nix-command flakes
      max-jobs = auto

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: ${{ inputs.extra-nix-config }}

    - name: Cachix
      id: cachix
      if: inputs.cachix-name != ''
      continue-on-error: true
      uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
      with:
        name: ${{ inputs.cachix-name }}
        authToken: ${{ inputs.cachix-auth-token }}
        useDaemon: true
        pushFilter: ${{ inputs.cachix-push-filter }}

    - name: Warn if Cachix is unavailable
      if: inputs.cachix-name != '' && steps.cachix.outcome == 'failure'
      shell: bash
      run: echo "::warning::Cachix setup failed; continuing without binary cache acceleration."
