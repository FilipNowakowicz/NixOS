name: Setup Nix
description: Install Nix with R2 binary cache.

inputs:
  extra-nix-config:
    description: Additional nix.conf lines (e.g. system-features for KVM tests).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@e4f4bde15728394ded896ef07491a85f2eb24956 # v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
          max-jobs = auto
          substituters = https://cache.nixos.org https://pub-706604c9179043ac98604d6de4c65c2c.r2.dev
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-cache-1:iXMQfhVxQ0A/q0kBj7cXFDjih82lFzVkPw30qYs0m5Y=
          ${{ inputs.extra-nix-config }}
