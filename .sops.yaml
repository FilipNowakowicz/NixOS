keys:
  # Replace with output of: age-keygen -o ~/.config/sops/age/keys.txt
  - &user age1v357mlvnesrq0gcgjystzsqaw4d3avaxz8fnxhlaqpktjzzytvqq796haz

  # VM SSH host key converted to age: ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
  - &vm_host age18g3r6u8cpw8re990wvpsk8rrvphz5ndthmck4ufk96prua8vuchqkg4h0e

  # Dedicated age key for homeserver-vm (private key stored in main's sops secrets)
  - &homeserver_vm_age age1jpd4jnhyqwjte9shxem8xyqcunsvfxhm0ej4pg8y3uemh6w4w5xqw48g6j

  # Main SSH host key converted to age: ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
  - &main_host age1nn9990zfx0azcv9fm0m5gmcw2lhg5e2px0wawgnew0234w3nrdws0v2c0f

  # Homeserver SSH host key converted to age: ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
  # Pre-generated and injected via reinstall-homeserver; private key stored encrypted in hosts/homeserver/secrets/
  - &homeserver_host age123dcg5al02n3lv0wyw2482wa6dfl8u550lp2mcplsve0gmq70udselsgjd

  # homeserver-gcp SSH host key converted to age: ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
  # Pre-generated; private key stored encrypted in hosts/homeserver-gcp/secrets/
  - &homeserver_gcp_host age13av6mujh9r7xv880k8elnfkqztpx3c8eahfwdl42wzss6sz9jchsc3hqg6

creation_rules:
  - path_regex: hosts/vm/secrets/.*
    key_groups:
      - age:
          - *user
          - *vm_host
  - path_regex: hosts/homeserver-vm/secrets/.*
    key_groups:
      - age:
          - *user
          - *homeserver_vm_age
  - path_regex: hosts/main/secrets/.*
    key_groups:
      - age:
          - *user
          - *main_host
  - path_regex: hosts/homeserver/secrets/.*
    key_groups:
      - age:
          - *user
          - *homeserver_host
  - path_regex: hosts/homeserver-gcp/secrets/.*
    key_groups:
      - age:
          - *user
          - *homeserver_gcp_host
