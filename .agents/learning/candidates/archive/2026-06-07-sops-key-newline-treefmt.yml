schema: learning-candidate/v1
id: 2026-06-07-sops-key-newline-treefmt
date: 2026-06-07
expires: 2026-09-05
status: superseded
route: promote-doc
best_form: ci-gate
evidence: [pr-#104; self-ssh failed "error in libcrypto: unsupported"/publickey until key's trailing newline restored; CI lint run 27076973050 failed on `nix fmt --fail-on-change` reformatting hosts/homeserver-gcp/secrets/secrets.yaml, green after `nix fmt`]
observation: Adding a multi-line key to a sops secrets.yaml via `sops --set` has two traps - `$(cat key)` strips the trailing newline (OpenSSH then rejects the key), and `nix fmt`/treefmt reformats the just-written secrets.yaml so the lint gate fails.
proposed_upgrade: Document in docs/security.md secrets section - read keys raw (assert trailing newline) before `sops --set`, then run `nix fmt` and re-verify `sops -d` decrypts; consider a check asserting secrets files are treefmt-clean and stored keys round-trip with `ssh-keygen -y`.
type: workflow-gotcha
dedupe_key: sops-multiline-key-newline-and-treefmt
triggers: [sops --set, secrets.yaml, ssh private key, nix fmt lint]
targets: [docs/security.md]
