source = ~/.config/hypr/hyprlock-colors.conf

general {
  disable_loading_bar = true
  hide_cursor         = true
  grace               = 0
}

background {
  monitor =
  path        = ~/.local/share/wallpapers/current.png
  blur_passes = 3
  blur_size   = 8
  brightness  = 0.5
}

# Clock
label {
  monitor     =
  text        = $TIME
  color       = rgba($textff)
  font_size   = 72
  font_family = JetBrainsMono Nerd Font
  halign      = center
  valign      = center
  position    = 0, 160
}

# Password input
input-field {
  monitor          =
  size             = 240, 48
  outline_thickness = 2
  dots_size        = 0.2
  dots_spacing     = 0.35
  outer_color      = rgb($amber)
  inner_color      = rgb($bg)
  font_color       = rgb($text)
  fade_on_empty    = true
  placeholder_text = <i>Password</i>
  check_color      = rgb($amber)
  fail_color       = rgb(cc241d)
  fail_text        = <i>$FAIL ($ATTEMPTS)</i>
  halign           = center
  valign           = center
  position         = 0, -80
}
