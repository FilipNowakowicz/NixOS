# ── Theme ────────────────────────────────────────────────────────────────────
# Generated by home-manager from home/theme/colors.nix
source = ~/.config/hypr/colors.conf


# ── Autostart ────────────────────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar


# ── Monitors ─────────────────────────────────────────────────────────────────
# `hyprctl monitors` to list detected outputs; add per-monitor lines as needed.
monitor = ,preferred,auto,1


# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout  = us
    kb_variant = dvorak
    kb_options = caps:escape

    follow_mouse = 1
    sensitivity  = 0
}


# ── General ───────────────────────────────────────────────────────────────────
general {
    gaps_in  = 8
    gaps_out = 12
    border_size = 2

    col.active_border   = $col_active
    col.inactive_border = $col_inactive
}


# ── Decoration ───────────────────────────────────────────────────────────────
decoration {
    rounding = 10

    blur {
        enabled = true
        size    = 8
        passes  = 2
    }

    shadow {
        enabled      = true
        range        = 12
        render_power = 2
        color        = rgba(1c1a18cc)
    }
}


# ── Animations ───────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = easeOut, 0.16, 1, 0.3, 1

    # Windows: fade + scale, 150ms
    animation = windows,    1, 1.5, easeOut, popin 80%
    animation = windowsOut, 1, 1.5, easeOut, popin 80%
    animation = fade,       1, 1.5, easeOut

    # Workspaces: horizontal slide, 200ms
    animation = workspaces, 1, 2, easeOut, slideh
}


# ── Layer rules ───────────────────────────────────────────────────────────────
layerrule = blur, waybar
layerrule = ignorezero, waybar


# ── Keybindings ───────────────────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return,     exec, kitty
bind = $mod, apostrophe, killactive
bind = $mod, Space,      exec, rofi -show drun

# Focus (vim-style, Dvorak key names)
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r

# Move window (vim-style, Dvorak key names)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r
