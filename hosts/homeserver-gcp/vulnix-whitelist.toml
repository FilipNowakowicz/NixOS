# Suppressed CVE findings for homeserver-gcp.
# vulnix skips whitelisted CVEs so they don't appear in metrics or alerts.
#
# Format: section key = package-version (quoted for keys with dots/dashes).
# Fields: cve (list or single string), comment (string), until (YYYY-MM-DD).
# Omitting `cve` suppresses all CVEs for that package version.
#
# ─────────────────────────────────────────────────────────────
# SECTION 1: Haskell package name collisions
#
# NVD matches CVEs by package name. Haskell libraries that share a name with
# unrelated software accumulate false-positive CVEs. Keys are version-scoped
# so the real system package retains its findings.
# ─────────────────────────────────────────────────────────────

